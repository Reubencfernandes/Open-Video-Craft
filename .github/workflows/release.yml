name: Release desktop apps

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            os: windows-latest
            npm_script: dist:win
            builder_args: "--publish never"
            artifact_name: open-video-craft-win
          - name: macOS
            npm_script: dist:mac
            os: macos-latest
            builder_args: "--x64 --arm64 --publish never"
            artifact_name: open-video-craft-mac

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate release tag version
        if: github.ref_type == 'tag'
        shell: bash
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          package_version="$(node -p 'require("./package.json").version')"
          test "$tag_version" = "$package_version" || {
            echo "Tag $GITHUB_REF_NAME does not match package.json version $package_version."
            exit 1
          }

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund
        timeout-minutes: 20

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build installers
        env:
          CSC_LINK: ${{ matrix.name == 'macOS' && secrets.CSC_LINK || secrets.WINDOWS_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ matrix.name == 'macOS' && secrets.CSC_KEY_PASSWORD || secrets.WINDOWS_CSC_KEY_PASSWORD }}
          CSC_NAME: ${{ matrix.name == 'macOS' && secrets.CSC_NAME || '' }}
          APPLE_ID: ${{ matrix.name == 'macOS' && secrets.APPLE_ID || '' }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ matrix.name == 'macOS' && secrets.APPLE_APP_SPECIFIC_PASSWORD || '' }}
          APPLE_TEAM_ID: ${{ matrix.name == 'macOS' && secrets.APPLE_TEAM_ID || '' }}
          APPLE_API_KEY: ${{ matrix.name == 'macOS' && secrets.APPLE_API_KEY || '' }}
          APPLE_API_KEY_ID: ${{ matrix.name == 'macOS' && secrets.APPLE_API_KEY_ID || '' }}
          APPLE_API_ISSUER: ${{ matrix.name == 'macOS' && secrets.APPLE_API_ISSUER || '' }}
        run: npm run ${{ matrix.npm_script }} -- ${{ matrix.builder_args }}

      - name: Verify Windows signatures when configured
        if: matrix.name == 'Windows'
        shell: pwsh
        env:
          WINDOWS_SIGNING_CONFIGURED: ${{ secrets.WINDOWS_CSC_LINK != '' }}
        run: |
          if ($env:WINDOWS_SIGNING_CONFIGURED -ne 'true') {
            Write-Warning 'WINDOWS_CSC_LINK is not configured; Windows artifacts are unsigned.'
            exit 0
          }
          $installers = Get-ChildItem -Path release -Filter *.exe -Recurse
          if ($installers.Count -eq 0) { throw 'No Windows installers were produced.' }
          foreach ($installer in $installers) {
            $signature = Get-AuthenticodeSignature $installer.FullName
            if ($signature.Status -ne 'Valid') {
              throw "Invalid signature for $($installer.Name): $($signature.Status)"
            }
          }

      - name: Verify macOS update archive
        if: matrix.name == 'macOS'
        env:
          OVC_MAC_TEAM_ID: "3XX79RB95N"
        run: npm run verify:mac-release

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            release/*/*.exe
            release/*/*.dmg
            release/*/*.zip
            release/*/*.blockmap
            release/*/latest*.yml
          if-no-files-found: error

  release:
    name: Publish GitHub release
    if: github.ref_type == 'tag'
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout release notes
        uses: actions/checkout@v4

      - name: Download installers
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Publish release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TAG_NAME: ${{ github.ref_name }}
        shell: bash
        run: |
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release edit "$TAG_NAME" --draft=true
          else
            gh release create "$TAG_NAME" \
              --draft \
              --title "$TAG_NAME" \
              --generate-notes
          fi

          while IFS= read -r -d '' file; do
            gh release upload "$TAG_NAME" "$file" --clobber
          done < <(find artifacts -type f -print0)

          gh release edit "$TAG_NAME" --draft=false
